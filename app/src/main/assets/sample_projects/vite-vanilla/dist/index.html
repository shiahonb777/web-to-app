<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>天气预报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0a1a;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.07);
            --text: #f0f0ff;
            --text2: rgba(240, 240, 255, 0.55);
            --text3: rgba(240, 240, 255, 0.3);
            --amber: #f59e0b;
            --radius: 14px
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            background: radial-gradient(ellipse at 50% 20%, rgba(245, 158, 11, 0.06) 0%, transparent 55%);
            pointer-events: none
        }

        .c {
            max-width: 460px;
            margin: 0 auto;
            padding: 0 14px 32px;
            position: relative;
            z-index: 1
        }

        .hero {
            text-align: center;
            padding: 32px 0 24px
        }

        .weather-icon {
            font-size: 72px;
            margin-bottom: 4px;
            animation: float 3s ease-in-out infinite
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        .temp {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -3px;
            background: linear-gradient(180deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .city {
            font-size: 18px;
            font-weight: 700;
            margin-top: 4px
        }

        .desc {
            font-size: 13px;
            color: var(--text2);
            margin-top: 2px
        }

        .search {
            display: flex;
            gap: 8px;
            margin-bottom: 20px
        }

        .search input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none
        }

        .search input:focus {
            border-color: var(--amber)
        }

        .search input::placeholder {
            color: var(--text3)
        }

        .search button {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #0a0a1a;
            border: none;
            border-radius: 10px;
            padding: 0 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px
        }

        .search button:active {
            transform: scale(.93)
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px
        }

        .detail {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            text-align: center
        }

        .detail-icon {
            font-size: 20px;
            margin-bottom: 4px
        }

        .detail-val {
            font-size: 18px;
            font-weight: 800;
            color: var(--amber)
        }

        .detail-label {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-top: 2px
        }

        .forecast {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px
        }

        .forecast-h {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .forecast-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 16px;
            background: rgba(245, 158, 11, 0.1);
            color: var(--amber)
        }

        .forecast-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03)
        }

        .forecast-row:last-child {
            border: none
        }

        .forecast-day {
            font-size: 13px;
            font-weight: 600;
            width: 50px
        }

        .forecast-icon {
            font-size: 20px;
            flex: 1;
            text-align: center
        }

        .forecast-temp {
            font-size: 14px;
            font-weight: 700;
            width: 80px;
            text-align: right
        }

        .forecast-temp span {
            color: var(--text3);
            font-weight: 500
        }

        .hourly {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            overflow-x: auto;
            display: flex;
            gap: 16px;
            margin-bottom: 16px
        }

        .hour {
            text-align: center;
            min-width: 50px
        }

        .hour-time {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 4px
        }

        .hour-icon {
            font-size: 20px;
            margin-bottom: 4px
        }

        .hour-temp {
            font-size: 14px;
            font-weight: 700
        }

        .ft {
            text-align: center;
            padding: 12px
        }

        .ft-b {
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(245, 158, 11, 0.04);
            border: 1px solid rgba(245, 158, 11, 0.08)
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .detail,
        .forecast,
        .hourly {
            animation: fadeIn .5s ease backwards
        }

        .detail:nth-child(1) {
            animation-delay: .1s
        }

        .detail:nth-child(2) {
            animation-delay: .15s
        }

        .detail:nth-child(3) {
            animation-delay: .2s
        }
    </style>
</head>

<body>
    <div class="c">
        <div class="hero">
            <div class="weather-icon" id="wi">☀️</div>
            <div class="temp" id="tp">26°</div>
            <div class="city" id="cn">北京</div>
            <div class="desc" id="ds">晴朗 · 体感 28°</div>
        </div>
        <div class="search"><input type="text" id="si" placeholder="搜索城市..." value="北京"><button
                onclick="searchCity()">搜索</button></div>
        <div class="details">
            <div class="detail">
                <div class="detail-icon">💧</div>
                <div class="detail-val" id="hm">45%</div>
                <div class="detail-label">湿度</div>
            </div>
            <div class="detail">
                <div class="detail-icon">💨</div>
                <div class="detail-val" id="wd">12km/h</div>
                <div class="detail-label">风速</div>
            </div>
            <div class="detail">
                <div class="detail-icon">🌡️</div>
                <div class="detail-val" id="fl">28°</div>
                <div class="detail-label">体感</div>
            </div>
        </div>
        <div class="hourly" id="hourly"></div>
        <div class="forecast">
            <div class="forecast-h"><span>7天预报</span><span class="forecast-badge">📅 预测</span></div>
            <div id="fc"></div>
        </div>
        <div class="ft">
            <div class="ft-b">🌤️ Vite Weather · Vanilla JS · WebToApp</div>
        </div>
    </div>
    <script>
        var cities = {
            '北京': { icon: '☀️', temp: 26, desc: '晴朗', humidity: 45, wind: 12, feels: 28 },
            '上海': { icon: '⛅', temp: 22, desc: '多云', humidity: 72, wind: 18, feels: 24 },
            '广州': { icon: '🌧️', temp: 28, desc: '雷阵雨', humidity: 88, wind: 8, feels: 32 },
            '深圳': { icon: '🌤️', temp: 27, desc: '晴转多云', humidity: 65, wind: 15, feels: 30 },
            '杭州': { icon: '🌥️', temp: 20, desc: '阴天', humidity: 78, wind: 10, feels: 21 },
            '成都': { icon: '🌫️', temp: 18, desc: '雾', humidity: 90, wind: 5, feels: 17 }
        };
        var forecastIcons = ['☀️', '⛅', '🌤️', '🌧️', '☀️', '⛅', '🌥️'];
        var dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        function searchCity() {
            var name = document.getElementById('si').value.trim();
            var data = cities[name] || { icon: '🌤️', temp: 20 + Math.floor(Math.random() * 12), desc: '晴朗', humidity: 40 + Math.floor(Math.random() * 40), wind: 5 + Math.floor(Math.random() * 20), feels: 22 + Math.floor(Math.random() * 8) };
            document.getElementById('wi').textContent = data.icon;
            document.getElementById('tp').textContent = data.temp + '°';
            document.getElementById('cn').textContent = name;
            document.getElementById('ds').textContent = data.desc + ' · 体感 ' + data.feels + '°';
            document.getElementById('hm').textContent = data.humidity + '%';
            document.getElementById('wd').textContent = data.wind + 'km/h';
            document.getElementById('fl').textContent = data.feels + '°';
            var hours = '';
            for (var i = 0; i < 8; i++) { var h = (new Date().getHours() + i) % 24; hours += '<div class="hour"><div class="hour-time">' + (h < 10 ? '0' : '') + h + ':00</div><div class="hour-icon">' + forecastIcons[i % forecastIcons.length] + '</div><div class="hour-temp">' + (data.temp + Math.floor(Math.random() * 6 - 3)) + '°</div></div>'; }
            document.getElementById('hourly').innerHTML = hours;
            var fc = '', today = new Date().getDay();
            for (var i = 0; i < 7; i++) { var hi = data.temp + Math.floor(Math.random() * 4) + 2, lo = data.temp - Math.floor(Math.random() * 4) - 1; fc += '<div class="forecast-row"><span class="forecast-day">' + (i === 0 ? '今天' : dayNames[(today + i) % 7]) + '</span><span class="forecast-icon">' + forecastIcons[i] + '</span><span class="forecast-temp">' + hi + '° <span>/ ' + lo + '°</span></span></div>'; }
            document.getElementById('fc').innerHTML = fc;
        }
        searchCity();
    </script>
</body>

</html>
